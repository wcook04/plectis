      family: "09"
      substrate: raw_seed
    predicate:
      field: counts.paragraphs_without_atoms
      operator: ge
      value: 30
    action:
      operation_id: raw_seed_prepare_subagent_packet
      parameters:
        family: "09"
        substrate: raw_seed
        cohort_size: 6
        wave_width: 2
        strategy: simple_first
    gate:
      single_flight: true
      cooldown_minutes: 0
      dedupe_by: signal_digest
      barrier_kind: operation_completion
    priority: low
    enabled_by_default: false
    provenance:
