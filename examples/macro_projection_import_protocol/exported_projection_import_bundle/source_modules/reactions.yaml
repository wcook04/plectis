  - reaction_id: distill_backlog_high
    label: Enqueue Type B raw-seed candidate jobs when paragraphs without atoms remain high
    source:
      kind: raw_seed_coverage
      family: "09"
      substrate: raw_seed
    predicate:
      field: counts.paragraphs_without_atoms
      operator: ge
      value: 10
    action:
