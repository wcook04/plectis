kind: reactions_config
schema_version: reactions_config_v1
reactions:
  - reaction_id: route_backlog_high
    label: Populate NVIDIA raw-seed navigation when pending routing shards exceed threshold
    source:
      kind: raw_seed_coverage
      family: "09"
      substrate: raw_seed
    predicate:
      field: counts.pending_routing_shards
      operator: ge
      value: 50
    action:
      operation_id: nvidia_continuous_navigation_populate
      parameters:
        batch_id: raw_seed_route_backlog_navigation
        source_kinds: raw_seed_shards,raw_seed_paragraphs,raw_seed_navigation
        max_sources: 3
        limit_per_source: 50
    gate:
      single_flight: true
      cooldown_minutes: 0
      dedupe_by: signal_digest
      barrier_kind: operation_completion
    priority: high
    enabled_by_default: true
    provenance:
      annexes:
        - restate
        - agent-orchestrator
      notes:
        - restate:n004 journal-gated retry after durable acknowledgement
        - restate:n005 wake barriers as explicit suspension data
        - agent-orchestrator:n005 declarative reactions config

  - reaction_id: raw_seed_sync_handoff_after_sync
