        - restate:n005 wake barriers as explicit suspension data
        - agent-orchestrator:n005 declarative reactions config
        - disabled_by_default_reason: V1 leaves subagent-lane auto-dispatch off until Opus gold seed calibrates the validator; conductor consumes packets manually for now (see codex/doctrine/skills/raw_seed/subagent_distill_protocol.md).

