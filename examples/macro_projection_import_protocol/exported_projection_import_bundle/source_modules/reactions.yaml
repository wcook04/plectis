    action:
      operation_id: compliance_autocure_campaign
      parameters:
        max_targets: 12
    gate:
      single_flight: true
      cooldown_minutes: 60
      dedupe_by: signal_digest
      barrier_kind: operation_completion
    priority: low
    enabled_by_default: true
    provenance:
      annexes:
        - restate
