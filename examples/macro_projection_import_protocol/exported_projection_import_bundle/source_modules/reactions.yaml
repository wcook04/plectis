  - reaction_id: claude_stop_consolidation_trigger
    label: Mark/schedule consolidation on a Claude Stop lifecycle boundary by refreshing the work-ledger projection (no doctrine mutation)
    source:
      kind: lifecycle_boundary
      agent_surface: claude
      boundary: stop
    predicate:
      field: stable_signal_digest
      operator: nonempty
      value: true
    action:
      operation_id: work_ledger_project
      parameters: {}
    gate:
      single_flight: true
      cooldown_minutes: 0
      dedupe_by: signal_digest
      barrier_kind: operation_completion
    priority: low
    enabled_by_default: true
    provenance:
      annexes:
        - claude-mem
        - lycheemem
      notes:
        - claude-mem:n003 lifecycle hooks + 0/1/2 exit-code contract — Stop is a typed lifecycle boundary, not an opaque end
        - lycheemem:n007 host-vs-external boundary consolidation triggered by lifecycle events
        - shape_note: First conservative consumer of session_lifecycle_boundary signals from .claude/hooks/runtime_hook.py::_emit_stop_lifecycle_signal. The Stop hook appends a session_lifecycle_boundary row to orchestration_events.jsonl with a deterministic stable_digest; this reaction surfaces that as stable_signal_digest so dedupe_by:signal_digest blocks re-fires of the same boundary. Action is intentionally a derived-projection refresh (work_ledger_project), not a doctrine apply lane — hooks are event sources, reactions are policy. Future SessionEnd / consolidation lanes can sit alongside this rule with different predicates.
        - semantic_note: This is a deduped WAKE SIGNAL, not an event queue. The underlying loader (_load_latest_lifecycle_boundary_event) returns the LATEST matching session_lifecycle_boundary row; the engine fires the action once per unique stable_signal_digest of that latest row. Intermediate older rows with different digests are NOT iterated or consumed. Acceptable for global/idempotent actions like work_ledger_project (one wake is enough). NOT acceptable for per-session distillation or agent_seed candidate emission — those would need cursor/backlog semantics that this loader does not provide. See codex/doctrine/paper_modules/runtime_hook_ladder.md §Stop handler shipped for the full decision table.
        - paper_module_anchor: codex/doctrine/paper_modules/runtime_hook_ladder.md §Stop handler shipped 2026-04-27

  - reaction_id: provider_transform_materialize_after_catalog_signal
    label: Draft-materialize the selected provider-model-catalog row job (operator inspection)
    source:
      kind: provider_model_catalog_signal
    predicate:
      field: row_count
      operator: ge
      value: 1
    action:
      operation_id: provider_transform_materialize
      parameters:
        source: provider-model-catalog
        target_row_id: "{signal.next_target_row_id}"
        limit: 50
    gate:
      single_flight: true
      cooldown_minutes: 60
      dedupe_by: signal_digest
      barrier_kind: operation_completion
    priority: low
    enabled_by_default: true
    provenance:
      annexes:
        - restate
      notes:
        - draft-only: this reaction never includes --write, never invokes provider_transform_job, and never calls a provider; it produces a scheduler-rejected provider_transform_job draft for operator inspection only.
        - shape_note: source.kind=provider_model_catalog_signal is emitted by metabolism_policy.build_runtime_signal_events via system.lib.provider_metabolism_signal.derive_provider_model_catalog_signal; signal_digest changes only when the catalog row set changes, so dedupe_by:signal_digest blocks re-fires of identical catalog states.
        - semantic_note: action.parameters.target_row_id binds {signal.next_target_row_id} from the read-only provider candidate feed, not the lexicographically-first row. This still fires at most ONE draft materialization per catalog change; it is NOT a backlog drainer. When the operator decides multi-row drainage is desired, that requires a separate cursor-aware reaction shape — DO NOT extend this rule by injecting a list-templating helper without a separate explicit operator decision.
        - enabled_by_default_rationale: the reactions engine writes every fire to tools/meta/control/reactions_ledger.jsonl (see reactions_engine.py:_append_jsonl(reactions_ledger_path(...), row) at the launch site), so autonomous fires are agent-visible at the reactions ledger surface. The action itself is bounded (single row), reversible (draft only, no --write), non-dispatching (provider_transform_materialize never invokes a provider), and deduped on signal_digest with a 60-minute cooldown. Per local_to_general_propagation.md governing-principles "Safe automation may fire by default when bounded and agent-visible" + "Autonomy must surface through the agent entrypoint," dormant-by-default would itself be under-building.
        - paper_module_anchor: codex/doctrine/skills/doctrine/local_to_general_propagation.md governs whether enabling this rule should produce up-propagation into a paper module.

  - reaction_id: standard_skill_gap_high
    label: Materialize a candidate-only standard_skill_pairing campaign packet when the gap of standards lacking a paired authoring skill exceeds the configured floor (Wave_004A)
    source:
      kind: standard_skill_gap_signal
    predicate:
      field: gap_high
      operator: eq
      value: true
    action:
      operation_id: standard_skill_pairing_campaign
      parameters:
        max_targets: 12
    gate:
      single_flight: true
      cooldown_minutes: 60
      dedupe_by: signal_digest
      barrier_kind: operation_completion
    priority: low
    enabled_by_default: true
    provenance:
      annexes:
        - restate
        - agent-orchestrator
      notes:
        - source.kind=standard_skill_gap_signal is emitted by system.lib.compliance_reaction_signals.build_standard_skill_gap_signal; the signal carries a digest hashed over the sorted missing-standard ids so dedupe_by:signal_digest blocks re-fires while the gap composition is unchanged.
        - action.operation_id=standard_skill_pairing_campaign is candidate-only; the campaign builder writes only state/meta_missions/standard_skill_pairing/<slug>/campaign_packet.json with promotion_state=draft and mutation_policy=candidate_packet_only. No skill authoring, no skill_registry edit, no source mutation.
        - enabled_by_default=true_rationale - Wave_004B landed the source.kind=standard_skill_gap_signal loader in reactions_engine.py and emitted the signal in metabolism_policy.build_runtime_signal_events; the campaign builder is candidate-only, controller-gated, digest-deduped (cooldown 60min, single_flight). Per local_to_general_propagation.md governing-principle "Safe automation may fire by default when bounded and agent-visible", this reaction now fires autonomously while remaining promotion_state=draft and mutation_policy=candidate_packet_only. The reactions ledger surfaces every fire.
        - paper_module_anchor: pri_133 governs whether the reaction is advisory-by-default or load-bearing; this row is advisory, controller-gated.

  - reaction_id: compliance_coverage_low
    label: Materialize a candidate-only compliance_autocure campaign packet when the cross-standard compliance ledger reports ready_now worklist entries or per-standard rates below the floor (Wave_004A)
    source:
