      notes:
        - source.kind=compliance_coverage_signal is emitted by system.lib.compliance_reaction_signals.build_compliance_coverage_signal; the signal carries a digest hashed over the sorted ready_now standard ids and below_floor standard ids so dedupe_by:signal_digest blocks re-fires while the coverage shape is unchanged.
        - action.operation_id=compliance_autocure_campaign is candidate-only; the campaign builder writes only state/meta_missions/compliance_autocure/<slug>/campaign_packet.json with promotion_state=draft, mutation_policy=candidate_packet_only, forbidden_surfaces=[source_writes_without_controller_review, provider_direct_mutation]. The controller (Type A authoring agent) owns promotion; providers do not.
        - enabled_by_default=true_rationale - Wave_004B landed the source.kind=compliance_coverage_signal loader in reactions_engine.py and emitted the signal in metabolism_policy.build_runtime_signal_events; the campaign builder is candidate-only with forbidden_surfaces=[source_writes_without_controller_review, provider_direct_mutation], digest-deduped (cooldown 60min, single_flight). Per local_to_general_propagation.md governing-principle "Safe automation may fire by default when bounded and agent-visible", this reaction now fires autonomously while remaining controller-gated for promotion.
        - paper_module_anchor: pri_133 governs whether the reaction is advisory-by-default or load-bearing; this row is advisory, controller-gated.
