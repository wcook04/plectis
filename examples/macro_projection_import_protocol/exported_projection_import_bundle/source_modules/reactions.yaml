      family: "09"
    predicate:
      field: returncode
      operator: eq
      value: 0
    action:
      operation_id: raw_seed_provider_candidate_cycle
      parameters:
        family: "09"
        substrate: raw_seed
        selection_mode: fresh_first
        providers: nvidia_nim,openrouter_api
        limit: 8
    gate:
      single_flight: true
      cooldown_minutes: 0
      dedupe_by: signal_digest
      barrier_kind: operation_completion
    priority: high
    enabled_by_default: true
    provenance:
      annexes:
        - restate
