      parameters:
        family: "09"
        substrate: raw_seed
        selection_mode: fresh_first
        providers: nvidia_nim,openrouter_api
        limit: 8
        # Provider candidate mode: materialize bounded transform_job packets
        # and enqueue independent NVIDIA/OpenRouter provider lanes. No bridge
        # dispatch and no source mutation; receipts/row_patches stay under
        # state/compute_workers until controller review imports or rejects.
    gate:
      single_flight: true
      cooldown_minutes: 0
      dedupe_by: signal_digest
      barrier_kind: operation_completion
    priority: medium
    enabled_by_default: true
    provenance:
      annexes:
