[build-system]
requires = ["setuptools>=77.0.3"]
build-backend = "setuptools.build_meta"

[project]
name = "microcosm-substrate"
version = "0.1.0"
description = "repo -> .microcosm: turn any folder into an inspectable work substrate."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
license-files = ["LICENSE"]
keywords = ["agent-runtime", "developer-tools", "microcosm", "observability", "substrate"]
authors = [
  { name = "William Cook", email = "williamwkcook@gmail.com" }
]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Software Development :: Libraries :: Application Frameworks"
]

[project.urls]
Homepage = "https://github.com/wcook04/microcosm-substrate"
Documentation = "https://github.com/wcook04/microcosm-substrate/blob/main/README.md"
Source = "https://github.com/wcook04/microcosm-substrate"
Issues = "https://github.com/wcook04/microcosm-substrate/issues"
Repository = "https://github.com/wcook04/microcosm-substrate"

[project.optional-dependencies]
test = [
  "numpy>=2,<3",
  "pandas>=3,<4",
  "pytest>=8,<9",
  "requests>=2,<3"
]

[project.scripts]
microcosm = "microcosm_core.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.data-files]
"share/microcosm-substrate" = [
  ".gitignore",
  "AGENTS.md",
  "AGENT_ROUTES.md",
  "ANTI_PRINCIPLES.md",
  "ARCHITECTURE.md",
  "AXIOMS.md",
  "CLAUDE.md",
  "CONSTITUTION.md",
  "CONTRIBUTING.md",
  "CODEX.md",
  "CURSOR.md",
  "FIRST_ACTION.md",
  "LICENSE",
  "MANIFEST.in",
  "Makefile",
  "NOTICE",
  "ORGANS.md",
  "PRINCIPLES.md",
  "PROVENANCE.md",
  "QUICKSTART.md",
  "RELEASE_DISCIPLINE.md",
  "README.md",
  "SECURITY.md",
  "bootstrap.sh",
  "pyproject.toml"
]
