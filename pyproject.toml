[build-system]
requires = ["setuptools>=77.0.3"]
build-backend = "setuptools.build_meta"

[project]
name = "microcosm-substrate"
version = "0.1.0"
description = "repo -> .microcosm: turn any folder into an inspectable work substrate."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
license-files = ["LICENSE"]
keywords = ["agent-runtime", "developer-tools", "microcosm", "observability", "substrate"]
authors = [
  { name = "Microcosm Substrate Contributors" }
]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Software Development :: Libraries :: Application Frameworks"
]

[project.urls]
Homepage = "https://github.com/wcook04/microcosm-substrate"
Documentation = "https://github.com/wcook04/microcosm-substrate/blob/main/README.md"
Source = "https://github.com/wcook04/microcosm-substrate"
Issues = "https://github.com/wcook04/microcosm-substrate/issues"
Repository = "https://github.com/wcook04/microcosm-substrate"

[project.optional-dependencies]
test = [
  "pytest>=8,<9"
]

[project.scripts]
microcosm = "microcosm_core.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.data-files]
"share/microcosm-substrate/core" = ["core/*.json"]
"share/microcosm-substrate/core/acceptance" = ["core/acceptance/*.json"]
"share/microcosm-substrate/core/fixture_manifests" = ["core/fixture_manifests/*.json"]
"share/microcosm-substrate/standards" = ["standards/*.json"]
"share/microcosm-substrate/receipts/runtime_shell" = ["receipts/runtime_shell/*.json"]
"share/microcosm-substrate/receipts/first_wave/verifier_lab_kernel" = ["receipts/first_wave/verifier_lab_kernel/*.json"]
"share/microcosm-substrate/examples/verifier_lab_kernel/exported_verifier_lab_kernel_bundle" = ["examples/verifier_lab_kernel/exported_verifier_lab_kernel_bundle/*.json"]
"share/microcosm-substrate/examples/verifier_lab_kernel/exported_verifier_lab_kernel_bundle/source_modules/microcosm_core/organs" = ["examples/verifier_lab_kernel/exported_verifier_lab_kernel_bundle/source_modules/microcosm_core/organs/*.py"]
"share/microcosm-substrate/examples/public_reveal_walkthrough/exported_public_reveal_bundle" = ["examples/public_reveal_walkthrough/exported_public_reveal_bundle/*.json"]
"share/microcosm-substrate/examples/public_reveal_walkthrough/exported_public_reveal_bundle/source_modules/ai_workflow/state/microcosm_portfolio/reconstruction" = ["examples/public_reveal_walkthrough/exported_public_reveal_bundle/source_modules/ai_workflow/state/microcosm_portfolio/reconstruction/*.json"]
"share/microcosm-substrate/examples/macro_projection_import_protocol/exported_projection_import_bundle" = ["examples/macro_projection_import_protocol/exported_projection_import_bundle/*.json", "examples/macro_projection_import_protocol/exported_projection_import_bundle/*.jsonl"]
"share/microcosm-substrate/examples/macro_projection_import_protocol/exported_projection_import_bundle/source_modules" = ["examples/macro_projection_import_protocol/exported_projection_import_bundle/source_modules/*.py", "examples/macro_projection_import_protocol/exported_projection_import_bundle/source_modules/*.yaml"]
"share/microcosm-substrate/examples/macro_projection_import_protocol/exported_projection_import_bundle/source_modules/.claude/hooks" = ["examples/macro_projection_import_protocol/exported_projection_import_bundle/source_modules/.claude/hooks/*.py"]
"share/microcosm-substrate/examples/macro_projection_import_protocol/exported_projection_import_bundle/source_modules/.githooks" = ["examples/macro_projection_import_protocol/exported_projection_import_bundle/source_modules/.githooks/*"]
"share/microcosm-substrate/examples/macro_projection_import_protocol/exported_projection_import_bundle/source_modules/codex/doctrine" = ["examples/macro_projection_import_protocol/exported_projection_import_bundle/source_modules/codex/doctrine/*.json"]
"share/microcosm-substrate/examples/macro_projection_import_protocol/exported_projection_import_bundle/source_modules/codex/doctrine/paper_modules" = ["examples/macro_projection_import_protocol/exported_projection_import_bundle/source_modules/codex/doctrine/paper_modules/*.md"]
"share/microcosm-substrate/examples/macro_projection_import_protocol/exported_projection_import_bundle/source_modules/codex/doctrine/skills/task_ledger" = ["examples/macro_projection_import_protocol/exported_projection_import_bundle/source_modules/codex/doctrine/skills/task_ledger/*.md"]
