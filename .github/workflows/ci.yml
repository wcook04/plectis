name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        # Public action tag: actions/checkout@v7. The workflow pins the action by SHA below.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Set up Python
        # Public action tag: actions/setup-python@v6. The workflow pins the action by SHA below.
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Run public test floor
        env:
          PIP_CACHE_DIR: ~/.cache/pip
        run: make test

  user-smoke:
    name: User smoke and timing
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: tests

    steps:
      - name: Check out repository
        # Public action tag: actions/checkout@v7. The workflow pins the action by SHA below.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Set up Python
        # Public action tag: actions/setup-python@v6. The workflow pins the action by SHA below.
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Run user smoke floor
        env:
          PIP_CACHE_DIR: ~/.cache/pip
        run: make user-smoke

      - name: Record onboarding benchmark
        env:
          PIP_CACHE_DIR: ~/.cache/pip
        run: >-
          make onboarding-benchmark
          BENCHMARK_ARGS="--repo-url https://github.com/wcook04/plectis.git --ref ${{ github.sha }}"

      - name: Upload onboarding benchmark
        # Public action tag: actions/upload-artifact@v7. The workflow pins the action by SHA below.
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: plectis-onboarding-benchmark-${{ github.sha }}
          path: .microcosm/onboarding-benchmark.json
          if-no-files-found: error
