name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        # Public action tag: actions/checkout@v4. The workflow pins the action by SHA below.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python
        # Public action tag: actions/setup-python@v5. The workflow pins the action by SHA below.
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Run public test floor
        env:
          PIP_CACHE_DIR: ~/.cache/pip
        run: make test

  user-smoke:
    name: User smoke and timing
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: tests

    steps:
      - name: Check out repository
        # Public action tag: actions/checkout@v4. The workflow pins the action by SHA below.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python
        # Public action tag: actions/setup-python@v5. The workflow pins the action by SHA below.
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Run user smoke floor
        env:
          PIP_CACHE_DIR: ~/.cache/pip
        run: make user-smoke

      - name: Record onboarding benchmark
        env:
          PIP_CACHE_DIR: ~/.cache/pip
        run: >-
          make onboarding-benchmark
          BENCHMARK_ARGS="--repo-url https://github.com/wcook04/plectis.git --ref ${{ github.sha }}"

      - name: Upload onboarding benchmark
        # Public action tag: actions/upload-artifact@v4. The workflow pins the action by SHA below.
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: plectis-onboarding-benchmark-${{ github.sha }}
          path: .microcosm/onboarding-benchmark.json
          if-no-files-found: error
