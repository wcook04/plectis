name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        # Public action tag: actions/checkout@v4. The workflow pins the action by SHA below.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python
        # Public action tag: actions/setup-python@v5. The workflow pins the action by SHA below.
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run repository verification target
        run: make ci

  user-smoke:
    name: User smoke and timing
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: tests

    steps:
      - name: Check out repository
        # Public action tag: actions/checkout@v4. The workflow pins the action by SHA below.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python
        # Public action tag: actions/setup-python@v5. The workflow pins the action by SHA below.
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"

      - name: Run user smoke floor
        run: make smoke

      - name: Run installed package smoke
        run: make package-smoke
